services:
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.development
    container_name: champions-clash-api-dev
    ports:
      - "3000:3000"

    env_file:
      - .env
    environment:
      NODE_ENV: development
      # Force use of internal docker network names
      DATABASE_HOST: champions-clash-mysql
      REDIS_HOST: champions-clash-redis
    command: sh -c "bun install && bun run db:generate && bun run db:migrate && bun run --watch src/index.ts"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .git/
            - dist/
            - logs/
        - action: rebuild
          path: package.json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - champions-clash-network

  mysql:
    image: mysql:lts
    container_name: champions-clash-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DATABASE_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - champions-clash-network

  # Redis
  redis:
    image: redis:alpine
    container_name: champions-clash-redis
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass $$REDIS_PASSWORD;
      else
        redis-server;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli ping || redis-cli -a $$REDIS_PASSWORD ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - champions-clash-network

volumes:
  mysql_data:
  redis_data:

networks:
  champions-clash-network:
    driver: bridge
