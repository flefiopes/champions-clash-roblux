# =============================================================================
# docker-compose.production.yml — Champions Clash — Stack Complète
# Traefik v3 + SSL Let's Encrypt + Prometheus + Grafana + Node Exporter + cAdvisor
# =============================================================================
#
# PRÉREQUIS — À exécuter UNE SEULE FOIS avant le premier démarrage :
#
#   # 1. Créer les répertoires de configuration
#   mkdir -p config/traefik/letsencrypt config/prometheus \
#            config/grafana/provisioning/datasources
#
#   # 2. Fichier de certificats ACME — chmod 600 OBLIGATOIRE (Traefik refuse sinon)
#   touch config/traefik/letsencrypt/acme.json && chmod 600 config/traefik/letsencrypt/acme.json
#
#   # 3. Générer le hash BasicAuth (protège le dashboard Traefik + Prometheus)
#   #    Installe apache2-utils si nécessaire : apt install apache2-utils
#   echo $(htpasswd -nB admin) | sed -e 's/\$/\$\$/g'
#   #    → Colle le résultat dans .env.production → TRAEFIK_DASHBOARD_AUTH=admin:$$2y$$...
#
#   # 4. Remplir .env.production (voir variables requises ci-dessous)
#
#   # 5. Tester avec le staging Let's Encrypt d'abord (décommente caServer dans traefik.yml)
#   #    puis repasse en production une fois les certificats validés.
#
#   docker compose -f docker-compose.production.yml up -d
#
# VARIABLES OBLIGATOIRES dans .env.production :
#   DOMAIN                   ex: mondomaine.com
#   ACME_EMAIL               ex: admin@mondomaine.com
#   TRAEFIK_DASHBOARD_AUTH   généré via htpasswd (voir étape 3)
#   GRAFANA_ADMIN_PASSWORD   mot de passe Grafana
#   DATABASE_NAME / DATABASE_USER / DATABASE_PASSWORD
#   REDIS_PASSWORD
#   APP_VERSION              ex: 1.0.0
#
# URLS UNE FOIS DÉMARRÉ :
#   API        → https://api.${DOMAIN}
#   Traefik    → https://traefik.${DOMAIN}   (BasicAuth requis)
#   Grafana    → https://grafana.${DOMAIN}
#   Prometheus → https://prometheus.${DOMAIN} (BasicAuth requis)
# =============================================================================

services:

  # =============================================================================
  # TRAEFIK v3 — Reverse Proxy & Terminaison TLS
  # =============================================================================
  traefik:
    image: traefik:v3.3
    container_name: champions-clash-traefik
    restart: unless-stopped

    ports:
      - "80:80" # HTTP → redirigé HTTPS via entrypoint
      - "443:443" # HTTPS
      - "443:443/udp" # HTTP/3 (QUIC)
      # ⚠️  Jamais 8080 en production — dashboard via HTTPS uniquement

    volumes:
      - ./config/traefik/traefik.yml:/traefik.yml:ro
      - ./config/traefik/letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      ACME_EMAIL: ${ACME_EMAIL}

    networks:
      - traefik-public
      - monitoring # Pour que Prometheus scrape le port :8082/metrics

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    labels:
      traefik.enable: "true"

      # --- Dashboard Traefik ---
      traefik.http.routers.traefik-dashboard.rule: "Host(`traefik.${DOMAIN}`)"
      traefik.http.routers.traefik-dashboard.entrypoints: "websecure"
      traefik.http.routers.traefik-dashboard.tls.certresolver: "letsencrypt"
      traefik.http.routers.traefik-dashboard.service: "api@internal"
      traefik.http.routers.traefik-dashboard.middlewares: "dashboard-auth@docker,secure-headers@docker"

      # --- Middleware : BasicAuth (dashboard Traefik + Prometheus) ---
      # Générer via : echo $(htpasswd -nB admin) | sed -e 's/\$/\$\$/g'
      traefik.http.middlewares.dashboard-auth.basicauth.users: "${TRAEFIK_DASHBOARD_AUTH}"
      traefik.http.middlewares.dashboard-auth.basicauth.removeheader: "true"

      # --- Middleware : En-têtes de sécurité HTTPS ---
      traefik.http.middlewares.secure-headers.headers.stsSeconds: "31536000"
      traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.secure-headers.headers.stsPreload: "true"
      traefik.http.middlewares.secure-headers.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.secure-headers.headers.browserXssFilter: "true"
      traefik.http.middlewares.secure-headers.headers.referrerPolicy: "strict-origin-when-cross-origin"
      traefik.http.middlewares.secure-headers.headers.permissionsPolicy: "camera=(), microphone=(), geolocation=()"
      traefik.http.middlewares.secure-headers.headers.customResponseHeaders.X-Powered-By: ""
      traefik.http.middlewares.secure-headers.headers.customResponseHeaders.Server: ""

      # --- Middleware : Rate limiting global ---
      traefik.http.middlewares.rate-limit.ratelimit.average: "100"
      traefik.http.middlewares.rate-limit.ratelimit.burst: "50"
      traefik.http.middlewares.rate-limit.ratelimit.period: "1s"

      com.champions-clash.service: "traefik"

  # =============================================================================
  # API — Champions Clash Backend (ElysiaJS / Bun)
  # =============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: champions-clash-api:${APP_VERSION:-latest}
    container_name: champions-clash-api
    restart: unless-stopped

    # Pas de `ports` — Traefik est le seul point d'entrée
    expose:
      - "3000"

    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_HOST: champions-clash-mysql
      REDIS_HOST: champions-clash-redis

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      traefik:
        condition: service_healthy

    networks:
      - traefik-public
      - champions-clash-internal

    volumes:
      - api_logs:/app/logs

    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/v1/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-public"

      traefik.http.routers.api.rule: "Host(`api.${DOMAIN}`)"
      traefik.http.routers.api.entrypoints: "websecure"
      traefik.http.routers.api.tls.certresolver: "letsencrypt"
      traefik.http.routers.api.service: "api-svc"
      traefik.http.routers.api.middlewares: "secure-headers@docker,rate-limit@docker"

      traefik.http.services.api-svc.loadbalancer.server.port: "3000"
      traefik.http.services.api-svc.loadbalancer.healthcheck.path: "/api/v1/health"
      traefik.http.services.api-svc.loadbalancer.healthcheck.interval: "30s"
      traefik.http.services.api-svc.loadbalancer.healthcheck.timeout: "5s"

      com.champions-clash.service: "api"

  # =============================================================================
  # MYSQL — Base de données principale
  # =============================================================================
  mysql:
    image: mysql:8.4-lts
    container_name: champions-clash-mysql
    restart: unless-stopped

    expose:
      - "3306" # Visible uniquement sur le réseau interne Docker

    environment:
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - champions-clash-internal

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "localhost"
        - "-u"
        - "${DATABASE_USER}"
        - "-p${DATABASE_PASSWORD}"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

    labels:
      com.champions-clash.service: "mysql"

  # =============================================================================
  # REDIS — Cache & Queue (BullMQ)
  # =============================================================================
  redis:
    image: redis:7.4-alpine
    container_name: champions-clash-redis
    restart: unless-stopped

    expose:
      - "6379"

    command: >
      sh -c "
        if [ -z \"$$REDIS_PASSWORD\" ]; then
          echo 'ERREUR: REDIS_PASSWORD est obligatoire en production' && exit 1;
        fi;
        redis-server
          --requirepass $$REDIS_PASSWORD
          --maxmemory 256mb
          --maxmemory-policy allkeys-lru
          --save 60 1000
          --appendonly yes
          --appendfsync everysec
          --loglevel notice
          --protected-mode yes
      "

    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    volumes:
      - redis_data:/data

    networks:
      - champions-clash-internal

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320M
        reservations:
          cpus: "0.10"
          memory: 64M

    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

    labels:
      com.champions-clash.service: "redis"

  # =============================================================================
  # PROMETHEUS — Collecte de métriques (Traefik, containers, hôte)
  # =============================================================================
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: champions-clash-prometheus
    restart: unless-stopped

    expose:
      - "9090"

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    networks:
      - traefik-public
      - monitoring

    depends_on:
      - cadvisor
      - node-exporter
      - traefik

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-public"

      traefik.http.routers.prometheus.rule: "Host(`prometheus.${DOMAIN}`)"
      traefik.http.routers.prometheus.entrypoints: "websecure"
      traefik.http.routers.prometheus.tls.certresolver: "letsencrypt"
      traefik.http.routers.prometheus.service: "prometheus-svc"
      traefik.http.routers.prometheus.middlewares: "dashboard-auth@docker,secure-headers@docker"

      traefik.http.services.prometheus-svc.loadbalancer.server.port: "9090"

      com.champions-clash.service: "prometheus"

  # =============================================================================
  # GRAFANA — Dashboards de visualisation
  # =============================================================================
  grafana:
    image: grafana/grafana:11.5.0
    container_name: champions-clash-grafana
    restart: unless-stopped

    expose:
      - "3000"

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"

      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN}"
      GF_SERVER_DOMAIN: "grafana.${DOMAIN}"

      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"

      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"

      GF_LOG_MODE: "console"
      GF_LOG_LEVEL: "warn"
      # Dashboards recommandés à importer depuis grafana.com :
      #   1860  → Node Exporter Full (CPU, RAM, disque, réseau hôte)
      #   893   → Docker & cAdvisor (métriques containers)
      #   17346 → Traefik v3 Official Dashboard

    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro

    networks:
      - traefik-public
      - monitoring

    depends_on:
      - prometheus

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-public"

      traefik.http.routers.grafana.rule: "Host(`grafana.${DOMAIN}`)"
      traefik.http.routers.grafana.entrypoints: "websecure"
      traefik.http.routers.grafana.tls.certresolver: "letsencrypt"
      traefik.http.routers.grafana.service: "grafana-svc"
      traefik.http.routers.grafana.middlewares: "secure-headers@docker"

      traefik.http.services.grafana-svc.loadbalancer.server.port: "3000"

      com.champions-clash.service: "grafana"

  # =============================================================================
  # NODE EXPORTER — Métriques système de l'hôte (CPU, RAM, disque, réseau)
  # =============================================================================
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: champions-clash-node-exporter
    restart: unless-stopped

    expose:
      - "9100"

    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.netdev.device-exclude=^(lo|docker|br-|veth).*"

    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave

    pid: host # Nécessaire pour les métriques de processus hôte

    networks:
      - monitoring

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M

    labels:
      com.champions-clash.service: "node-exporter"

  # =============================================================================
  # cADVISOR — Métriques des containers Docker
  # =============================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: champions-clash-cadvisor
    restart: unless-stopped

    expose:
      - "8080"

    command:
      - "--housekeeping_interval=30s"
      - "--max_housekeeping_interval=60s"
      - "--store_container_labels=false"
      - "--disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,cpu_topology,resctrl"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

    privileged: true # Requis par cAdvisor pour accéder aux cgroups Linux
    devices:
      - /dev/kmsg:/dev/kmsg

    networks:
      - monitoring

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

    labels:
      com.champions-clash.service: "cadvisor"

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  mysql_data:
    driver: local
    labels:
      com.champions-clash.volume: "mysql-data"

  redis_data:
    driver: local
    labels:
      com.champions-clash.volume: "redis-data"

  api_logs:
    driver: local
    labels:
      com.champions-clash.volume: "api-logs"

  prometheus_data:
    driver: local
    labels:
      com.champions-clash.volume: "prometheus-data"

  grafana_data:
    driver: local
    labels:
      com.champions-clash.volume: "grafana-data"

# =============================================================================
# RÉSEAUX — Architecture en 3 zones isolées
#
#  traefik-public           Internet → Traefik → API, Grafana, Prometheus
#  champions-clash-internal API → MySQL, Redis   (internal: true, aucun accès externe)
#  monitoring               Prometheus → Traefik :8082, Node Exporter, cAdvisor
#                           (internal: true, aucun accès externe)
#
# MySQL et Redis n'apparaissent sur AUCUN réseau public.
# =============================================================================
networks:
  traefik-public:
    driver: bridge
    name: traefik-public

  champions-clash-internal:
    driver: bridge
    name: champions-clash-internal
    internal: true

  monitoring:
    driver: bridge
    name: champions-clash-monitoring
    internal: true
